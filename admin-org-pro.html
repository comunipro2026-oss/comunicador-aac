<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ComuniPro® — Panel de Organización</title>
<style>
:root {
  --red: #7c3aed;
  --red2: #5b21b6;
  --dark: #0a0a0f;
  --dark2: #13131a;
  --dark3: #1a1a24;
  --card: #1e1e2a;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f5;
  --text2: #9090a8;
  --green: #06d6a0;
  --blue: #4fc3f7;
  --accent: #ff6b6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
}

/* ── LOGIN ── */
#loginGate {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  background: radial-gradient(ellipse at 50% 0%, rgba(183,28,28,0.3) 0%, transparent 70%);
}
.login-header {
  text-align: center;
  margin-bottom: 32px;
}
.login-shield { font-size: 3rem; margin-bottom: 8px; }
.login-title { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; }
.login-title span { color: var(--red2); }
.login-sub { font-size: 0.75rem; color: var(--text2); letter-spacing: 3px; margin-top: 4px; }
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  width: 100%;
  max-width: 400px;
}
.login-label { font-size: 0.7rem; color: var(--text2); letter-spacing: 2px; margin-bottom: 8px; display: block; }
.login-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  color: var(--text);
  font-size: 1rem;
  outline: none;
  margin-bottom: 16px;
  font-family: 'Courier New', monospace;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.login-input:focus { border-color: var(--red2); }
.login-input[type="password"] { text-transform: none; letter-spacing: normal; font-family: inherit; }
.login-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--red2));
  border: none;
  border-radius: 10px;
  padding: 16px;
  color: white;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  margin-top: 8px;
}
.login-btn:hover { opacity: 0.9; }
.login-err { color: var(--accent); font-size: 0.8rem; text-align: center; margin-top: 12px; min-height: 20px; }

/* ── APP ── */
#appPanel { display: none; }
#appPanel.show { display: block; }

.top-bar {
  background: var(--dark2);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-org { font-weight: 700; font-size: 1rem; }
.top-org span { color: var(--red2); }
.top-meta { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
.logout-btn {
  background: rgba(183,28,28,0.2);
  border: 1px solid rgba(183,28,28,0.4);
  border-radius: 8px;
  color: var(--accent);
  padding: 8px 16px;
  font-size: 0.8rem;
  cursor: pointer;
  font-weight: 600;
}

.container { padding: 24px 20px; max-width: 700px; margin: 0 auto; }

.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.stat-num { font-size: 2rem; font-weight: 900; color: var(--blue); }
.stat-label { font-size: 0.65rem; color: var(--text2); letter-spacing: 1px; margin-top: 4px; }

.section-title {
  font-size: 0.75rem;
  color: var(--text2);
  letter-spacing: 2px;
  margin-bottom: 16px;
  text-transform: uppercase;
}

/* Crear usuario */
.create-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; }
.form-group.full { grid-column: 1/-1; }
.form-label { font-size: 0.65rem; color: var(--text2); letter-spacing: 1px; margin-bottom: 6px; }
.form-input, .form-select {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--blue); }
.form-select option { background: var(--dark2); }
.create-btn {
  width: 100%;
  background: linear-gradient(135deg, #1565C0, #5b21b6);
  border: none;
  border-radius: 10px;
  padding: 14px;
  color: white;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  margin-top: 16px;
}
.create-btn:hover { opacity: 0.9; }
.create-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.limit-bar-wrap { margin-bottom: 8px; }
.limit-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--text2); margin-bottom: 6px; }
.limit-bar { background: rgba(255,255,255,0.1); border-radius: 4px; height: 6px; }
.limit-fill { background: linear-gradient(90deg, var(--green), var(--blue)); height: 6px; border-radius: 4px; transition: width 0.4s; }

/* Lista usuarios */
.user-list { display: flex; flex-direction: column; gap: 10px; }
.user-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.user-info { display: flex; flex-direction: column; gap: 3px; }
.user-name { font-weight: 700; font-size: 0.95rem; }
.user-code {
  font-family: 'Courier New', monospace;
  font-size: 0.8rem;
  color: var(--blue);
  background: rgba(79,195,247,0.1);
  padding: 2px 8px;
  border-radius: 4px;
  display: inline-block;
}
.user-rango { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
.user-actions { display: flex; gap: 8px; }
.btn-del {
  background: rgba(183,28,28,0.2);
  border: 1px solid rgba(183,28,28,0.3);
  border-radius: 6px;
  color: var(--accent);
  padding: 6px 12px;
  font-size: 0.75rem;
  cursor: pointer;
}
.btn-del:hover { background: rgba(183,28,28,0.4); }
.btn-wa {
  background: rgba(37,211,102,0.2);
  border: 1px solid rgba(37,211,102,0.3);
  border-radius: 6px;
  color: #25d366;
  padding: 6px 12px;
  font-size: 0.75rem;
  cursor: pointer;
}
.btn-wa:hover { background: rgba(37,211,102,0.4); }

.empty-msg { text-align: center; color: var(--text2); padding: 40px 20px; font-size: 0.9rem; }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 24px;
  font-size: 0.9rem;
  font-weight: 600;
  transition: transform 0.3s;
  z-index: 999;
  white-space: nowrap;
}
.toast.on { transform: translateX(-50%) translateY(0); }

@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr; }
  .stat-row { grid-template-columns: repeat(3,1fr); }
  .stat-num { font-size: 1.5rem; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginGate">
  <div class="login-header">
    <div class="login-shield">🧩</div>
    <div class="login-title">Comuni<span>PRO</span>®</div>
    <div class="login-sub">PANEL DE ORGANIZACIÓN</div>
  </div>
  <div class="login-card">
    <label class="login-label">CÓDIGO DE ADMINISTRADOR</label>
    <input class="login-input" id="orgCodigo" type="text" placeholder="CP-XXXXXX" maxlength="9"
           oninput="formatLoginCode(this)" onkeydown="if(event.key==='Enter')doOrgLogin()">
    <label class="login-label">CONTRASEÑA</label>
    <input class="login-input" id="orgPass" type="password" placeholder="••••••••"
           onkeydown="if(event.key==='Enter')doOrgLogin()">
    <button class="login-btn" onclick="doOrgLogin()">🔐 INGRESAR</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- APP PANEL -->
<div id="appPanel">
  <div class="top-bar">
    <div>
      <div class="top-org" id="orgNombre">Organización</div>
      <div class="top-meta" id="orgMeta"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">↩ SALIR</button>
  </div>
  <div class="container">

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">USUARIOS</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statLimite">0</div>
        <div class="stat-label">LÍMITE</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statLibres">0</div>
        <div class="stat-label">DISPONIBLES</div>
      </div>
    </div>

    <div class="limit-bar-wrap">
      <div class="limit-label">
        <span>Uso de licencias</span>
        <span id="limitText">0/0</span>
      </div>
      <div class="limit-bar"><div class="limit-fill" id="limitFill" style="width:0%"></div></div>
    </div>

    <br>
    <div class="section-title">➕ CREAR NUEVO USUARIO</div>
    <div class="create-card">
      <div class="form-grid">
        <div class="form-group">
          <div class="form-label">NOMBRE</div>
          <input class="form-input" id="newNombre" type="text" placeholder="Juan">
        </div>
        <div class="form-group">
          <div class="form-label">APELLIDO</div>
          <input class="form-input" id="newApellido" type="text" placeholder="García">
        </div>
        <div class="form-group full">
          <div class="form-label">RANGO / ROL</div>
          <select class="form-select" id="newRango">
            <option value="Agente">👤 Agente</option>
            <option value="Suboficial">🎖️ Suboficial</option>
            <option value="Oficial">⭐ Oficial</option>
            <option value="Comisario">🏅 Comisario</option>
            <option value="Médico">🩺 Médico</option>
            <option value="Enfermero">💊 Enfermero</option>
            <option value="Docente">📚 Docente</option>
            <option value="Director">🏫 Director</option>
            <option value="Otro">👤 Otro</option>
          </select>
        </div>
        <div class="form-group full">
          <div class="form-label">TELÉFONO WHATSAPP (opcional)</div>
          <input class="form-input" id="newTelefono" type="tel" placeholder="598912345678">
          <div style="font-size:0.65rem;color:var(--text2);margin-top:4px;">Incluí código de país. Ej: 598 para Uruguay</div>
        </div>
      </div>
      <button class="create-btn" id="createBtn" onclick="crearUsuario()">✨ CREAR USUARIO</button>
    </div>

    <div class="section-title">👥 MIS USUARIOS</div>
    <div class="user-list" id="userList">
      <div class="empty-msg">Cargando...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   SUPABASE CONFIG — ComuniPro®
   © Adriana Soba
══════════════════════════════════════ */
const SB_URL = "https://lgpqyjevdwstbnerawmp.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxncHF5amV2ZHdzdGJuZXJhd21wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzM1OTgsImV4cCI6MjA5MjgwOTU5OH0.GMPbwHdxj_aRLaJgDHCkDA5L1KHAwLJLkO9LYOpI8pA";

let currentOrg = null;
let currentAdmin = null;

function sbHeaders() {
  return {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${SB_KEY}`,
    'Content-Type': 'application/json'
  };
}

async function sbGet(table, params) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: sbHeaders() });
  if (!res.ok) throw new Error('Error ' + res.status);
  return res.json();
}

async function sbPost(table, body) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { ...sbHeaders(), 'Prefer': 'return=representation' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('Error ' + res.status);
  return res.json();
}

async function sbDelete(table, id) {
  const res = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'DELETE',
    headers: sbHeaders()
  });
  if (!res.ok) throw new Error('Error ' + res.status);
}

/* ── FORMAT CODE ── */
function formatLoginCode(input) {
  let v = input.value.toUpperCase().replace(/[^A-Z0-9-]/g,'');
  if (!v.startsWith('CP-')) {
    if (v.startsWith('CP')) v = 'CP-' + v.slice(2);
    else if (v.startsWith('C')) v = 'CP-' + v.slice(1);
    else v = 'CP-' + v;
  }
  v = 'CP-' + v.slice(3).slice(0,6);
  input.value = v;
}

/* ── LOGIN ── */
async function doOrgLogin() {
  const codigo = document.getElementById('orgCodigo').value.trim().toUpperCase();
  const pass = document.getElementById('orgPass').value;
  const err = document.getElementById('loginErr');
  err.textContent = '';

  if (!codigo || !pass) { err.textContent = '⚠️ Completá todos los campos.'; return; }

  try {
    // Para ComuniPro: buscar por admin_codigo en organizaciones de comunipro
    const orgs = await sbGet('organizaciones', `admin_codigo=eq.${encodeURIComponent(codigo)}&activa=eq.true&select=*`);
    if (!orgs.length) { err.textContent = '❌ Código no encontrado o inactivo.'; return; }
    const org = orgs[0];
    if (org.admin_password !== pass) { err.textContent = '❌ Contraseña incorrecta.'; return; }

    currentAdmin = { codigo, password: pass };
    currentOrg = org;
    mostrarPanel();
  } catch(e) {
    err.textContent = '❌ Error de conexión: ' + e.message;
  }
}

/* ── PANEL ── */
async function mostrarPanel() {
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('appPanel').classList.add('show');
  document.getElementById('orgNombre').textContent = currentOrg.nombre;
  document.getElementById('orgMeta').textContent = `${currentOrg.tipo || 'Organización'} · Vence: ${currentOrg.fecha_vencimiento || 'Sin límite'}`;
  await cargarUsuarios();
}

async function cargarUsuarios() {
  const lista = document.getElementById('userList');
  lista.innerHTML = '<div class="empty-msg">Cargando...</div>';
  try {
    // Get users linked to this org - try multiple strategies
    let usuarios = [];
    // Strategy 1: by admin_email
    if(currentOrg.admin_email) {
      usuarios = await sbGet('licencias2', `email=eq.${encodeURIComponent(currentOrg.admin_email)}&tipo=eq.clinica&select=*`);
    }
    // Strategy 2: by org email fallback
    if(!usuarios.length && currentOrg.admin_codigo) {
      const fallbackEmail = 'org_' + currentOrg.admin_codigo + '@comunicap.uy';
      usuarios = await sbGet('licencias2', `email=eq.${encodeURIComponent(fallbackEmail)}&tipo=eq.clinica&select=*`);
    }
    const limite = currentOrg.limite_usuarios || 15;
    const total = usuarios.length;
    const libres = limite - total;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statLimite').textContent = limite;
    document.getElementById('statLibres').textContent = Math.max(0, libres);
    document.getElementById('limitText').textContent = `${total}/${limite}`;
    document.getElementById('limitFill').style.width = Math.min(100, (total/limite)*100) + '%';

    if (!usuarios.length) {
      lista.innerHTML = '<div class="empty-msg">🙌 Aún no hay usuarios. ¡Creá el primero!</div>';
      return;
    }
    lista.innerHTML = usuarios.map(u => `
      <div class="user-item">
        <div class="user-info">
          <div class="user-name">${[u.nombre,u.apellido].filter(Boolean).join(' ') || '—'}</div>
          <div class="user-code">${(u.clave||u.codigo||'—')}</div>
          <div class="user-rango">${u.tipo || 'ComuniPro'}</div>
        </div>
        <div class="user-actions">
          <button class="btn-wa" onclick="compartirWA('${(u.clave||u.codigo)}', '${u.nombre}')" style="background:rgba(37,211,102,0.15);border:1px solid rgba(37,211,102,0.3);border-radius:6px;color:#25d366;padding:6px 12px;font-size:0.75rem;cursor:pointer;">📲</button>
          <button class="btn-del" onclick="eliminarUsuario('${u.id}', '${u.nombre}')">🗑️</button>
        </div>
      </div>
    `).join('');
  } catch(e) {
    lista.innerHTML = `<div class="empty-msg">❌ Error: ${e.message}</div>`;
  }
}

/* ── CREAR USUARIO ── */
function genCodigo() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'CP-';
  for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

async function crearUsuario() {
  const nombre = document.getElementById('newNombre').value.trim();
  const apellido = document.getElementById('newApellido').value.trim();
  const rango = document.getElementById('newRango').value;
  const btn = document.getElementById('createBtn');

  if (!nombre) { showToast('⚠️ El nombre es obligatorio', '#ef4444'); return; }

  const limite = currentOrg.limite_usuarios || 15;
  let usuariosCount = [];
    if(currentOrg.admin_email) {
      usuariosCount = await sbGet('licencias2', `email=eq.${encodeURIComponent(currentOrg.admin_email)}&tipo=eq.clinica&select=id`);
    }
    if(!usuariosCount.length && currentOrg.admin_codigo) {
      const fb = 'org_' + currentOrg.admin_codigo + '@comunicap.uy';
      usuariosCount = await sbGet('licencias2', `email=eq.${encodeURIComponent(fb)}&tipo=eq.clinica&select=id`);
    }
    const usuarios = usuariosCount;
  if (usuarios.length >= limite) {
    showToast('❌ Límite de usuarios alcanzado', '#ef4444');
    return;
  }

  btn.disabled = true; btn.textContent = '⏳ CREANDO...';
  try {
    const codigo = genCodigo();
    const nombreCompleto = [nombre, apellido].filter(Boolean).join(' ');
    const orgEmail = currentOrg.admin_email || ('org_' + currentOrg.admin_codigo + '@comunicap.uy');
    await sbPost('licencias2', {
      clave: codigo,
      nombre: nombre || null,
      apellido: apellido || null,
      email: orgEmail,
      tipo: 'clinica',
      activa: true,
      fecha_vencimiento: currentOrg.fecha_vencimiento || null
    });
    showToast(`✅ Usuario creado: ${codigo}`, '#06d6a0');
    const nombreCompleto2 = [nombre, apellido].filter(Boolean).join(' ');
    const telUsuario = document.getElementById('newTelefono').value.trim().replace(/\D/g,'');
    document.getElementById('newTelefono').value = '';
    if(telUsuario) {
      // Enviar WhatsApp automáticamente si hay teléfono
      compartirWAConTel(codigo, nombreCompleto2 || 'usuario', telUsuario);
    } else {
      setTimeout(() => {
        if(confirm(`¿Compartir código ${codigo} con ${nombreCompleto2 || 'el usuario'} por WhatsApp?`)) {
          compartirWA(codigo, nombreCompleto2 || 'usuario');
        }
      }, 500);
    }
    document.getElementById('newNombre').value = '';
    document.getElementById('newApellido').value = '';
    await cargarUsuarios();
    // Compartir por WhatsApp
    const link = 'https://comunipro2026-oss.github.io/comunicador-aac/';
    const msg = `🧩 *ComuniPro® — Acceso*\n\nHola ${nombreCompleto}!\n\nTu código de acceso es:\n*${codigo}*\n\n📱 Ingresá desde:\n${link}\n\n_${currentOrg.nombre}_`;
    const waUrl = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    if(confirm(`✅ Usuario ${codigo} creado.\n\n¿Querés compartir el acceso por WhatsApp ahora?`)) {
      window.open(waUrl, '_blank');
    }
  } catch(e) {
    showToast('❌ Error: ' + e.message, '#ef4444');
  } finally {
    btn.disabled = false; btn.textContent = '✨ CREAR USUARIO';
  }
}

/* ── ELIMINAR ── */
async function eliminarUsuario(id, nombre) {
  if (!confirm(`¿Eliminar a ${nombre}?`)) return;
  try {
    await sbDelete('licencias2', id);
    showToast('🗑️ Usuario eliminado', '#ff9800');
    await cargarUsuarios();
  } catch(e) {
    showToast('❌ Error: ' + e.message, '#ef4444');
  }
}

/* ── LOGOUT ── */
function doLogout() {
  currentOrg = null;
  currentAdmin = null;
  document.getElementById('loginGate').style.display = 'flex';
  document.getElementById('appPanel').classList.remove('show');
  document.getElementById('orgCodigo').value = '';
  document.getElementById('orgPass').value = '';
  document.getElementById('loginErr').textContent = '';
}

/* ── WHATSAPP SHARE ── */
function compartirWAConTel(codigo, nombre, telefono) {
